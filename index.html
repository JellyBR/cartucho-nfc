<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    
    <!-- Bloqueio de Zoom e Escala Extrema -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    
    <!-- Link para o Manifesto Nativo -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Meta-tags de Imersão para iOS (Apple) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sistema">
    
    <title>Sistema de Execução</title>
    
    <style>
        /* Desativa seleções de texto acidentais durante o jogo */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            touch-action: none; 
        }
        
        #game-container { width: 100vw; height: 100vh; position: relative; z-index: 1; }
        
        #power-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        .cart-status { color: #00ff00; font-size: 1.2rem; margin-bottom: 40px; text-shadow: 0 0 10px #00ff00; text-transform: uppercase; }
        #power-btn { background-color: transparent; border: 3px solid #ff0000; color: #ff0000; padding: 15px 40px; font-size: 1.8rem; font-weight: bold; font-family: inherit; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: all 0.1s ease-in-out; }
        #power-btn:active { background-color: #ff0000; color: #000; transform: scale(0.95); }
        
        #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader-text { color: #fff; font-size: 1.5rem; font-weight: bold; letter-spacing: 3px; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 1; text-shadow: 0 0 15px #fff; } 100% { opacity: 0.2; } }

        #status-msg { display: none; color: #fff; text-align: center; margin-top: 40vh; position: relative; z-index: 10; }
    </style>
</head>
<body>
    
    <div id="power-screen">
        <div class="cart-status">Conexão Estabelecida</div>
        <button id="power-btn">POWER ON</button>
    </div>

    <div id="loading-overlay">
        <div class="loader-text">DECODIFICANDO DADOS...</div>
    </div>

    <div id="game-container"><div id="game"></div></div>
    <div id="status-msg">Acesso Negado ou Dados Ausentes.</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        const sys = urlParams.get('c');
        const dataId = urlParams.get('id');

        if (sys && dataId) {
            document.getElementById('power-btn').addEventListener('click', function() {
                
                // INJEÇÃO TÁTICA: FORÇAR TELA CHEIA (FULLSCREEN API)
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) {
                    docElm.requestFullscreen().catch(err => console.warn(err));
                } else if (docElm.webkitRequestFullscreen) { /* Safari / iOS */
                    docElm.webkitRequestFullscreen();
                }
                
                document.getElementById('power-screen').style.display = 'none';
                document.getElementById('loading-overlay').style.display = 'flex';

                window.EJS_player = '#game';
                window.EJS_core = sys;
                window.EJS_gameUrl = `roms/${sys}/${dataId}`;
                window.EJS_startOnLoaded = true;
                window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
                
                window.EJS_onGameStart = function() {
                    document.getElementById('loading-overlay').style.display = 'none';
                };

                const script = document.createElement('script');
                script.src = 'https://cdn.emulatorjs.org/latest/data/loader.js';
                document.body.appendChild(script);
            });

        } else {
            document.getElementById('power-screen').style.display = 'none';
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('status-msg').style.display = 'block';
        }
    </script>
</body>
</html>
